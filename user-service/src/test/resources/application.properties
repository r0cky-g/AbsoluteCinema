spring.application.name=user-service-test

spring.datasource.url=jdbc:h2:mem:userstest;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Movie WebClient base URL (not called by integration tests that mock outbound calls)
app.movie-service.url=http://127.0.0.1:59999

# Avoid real SMTP during tests (EmailService still receives a bean from test config)
spring.mail.host=127.0.0.1
spring.mail.port=3025
spring.mail.username=test
spring.mail.password=test
