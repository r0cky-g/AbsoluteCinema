spring.application.name=ui-service
server.port=8080

# Vaadin settings
vaadin.launch-browser=false
vaadin.allowed-packages=com.vaadin,org.vaadin,dev.hilla,ca.yorku.eecs4314group12.ui
vaadin.productionMode=true

# Fix for bean conflict between Spring Boot 4 and Vaadin 25
spring.main.allow-bean-definition-overriding=true

# Vaadin dev tools
vaadin.devtools.enabled=false
vaadin.copilot.enabled=false

# Backend service URLs (overridden by docker-compose environment variables in Docker)
app.api-service.url=http://localhost:8081
app.movie-service.url=http://localhost:8083
app.review-service.url=http://localhost:8084
app.forum-service.url=http://localhost:8085