spring.application.name=ui-service
server.port=8080

# Vaadin settings
vaadin.launch-browser=false
vaadin.allowed-packages=com.vaadin,org.vaadin,dev.hilla,ca.yorku.eecs4314group12.ui
vaadin.productionMode=true

# Fix for bean conflict between Spring Boot 4 and Vaadin 25
spring.main.allow-bean-definition-overriding=true

# Vaadin dev tools
vaadin.devtools.enabled=false
vaadin.copilot.enabled=false

# Backend URLs — use ${VAR:default} so Docker Compose env vars actually apply (hyphenated keys
# like app.api-service.url do not reliably map from APP_API_SERVICE_URL via relaxed binding).
app.api-service.url=${APP_API_SERVICE_URL:http://localhost:8081}
app.movie-service.url=${APP_MOVIE_SERVICE_URL:http://localhost:8083}
app.review-service.url=${APP_REVIEW_SERVICE_URL:http://localhost:8084}
app.forum-service.url=${APP_FORUM_SERVICE_URL:http://localhost:8085}
app.user-service.url=${APP_USER_SERVICE_URL:http://localhost:8082}