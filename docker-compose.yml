services:

  # -------------------------------------------------------------------------
  # PostgreSQL — shared database server, separate databases per service
  # -------------------------------------------------------------------------
  postgres:
    image: postgres:16
    container_name: absolute-cinema-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # movie-service  (port 8083)
  # -------------------------------------------------------------------------
  movie-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.movie-service
    container_name: movie-service
    environment:
      SERVER_PORT: 8083
      TMDB_TOKEN: ${TMDB_TOKEN}
      MONGODB_URI: ${MONGODB_URI}
    ports:
      - "8083:8083"

  # -------------------------------------------------------------------------
  # user-service  (port 8082)
  # -------------------------------------------------------------------------
  user-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.user-service
    container_name: user-service
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/user_service
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      DB_PASSWORD: ${DB_PASSWORD}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      APP_MOVIE_SERVICE_URL: http://movie-service:8083
    ports:
      - "8082:8082"
    depends_on:
      - postgres

  # -------------------------------------------------------------------------
  # review-service  (port 8084)
  # -------------------------------------------------------------------------
  review-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.review-service
    container_name: review-service
    environment:
      SERVER_PORT: 8084
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/review_service
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8084:8084"
    depends_on:
      - postgres

  # -------------------------------------------------------------------------
  # forum-service  (port 8085)
  # -------------------------------------------------------------------------
  forum-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.forum-service
    container_name: forum-service
    environment:
      SERVER_PORT: 8085
      SPRING_DATASOURCE_URL: jdbc:postgresql://absolute-cinema-db:5432/forum_service
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8085:8085"
    depends_on:
      - postgres

  # -------------------------------------------------------------------------
  # api-service  (port 8081)
  # -------------------------------------------------------------------------
  api-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.api-service
    container_name: api-service
    environment:
      SERVER_PORT: 8081
      APP_USER_SERVICE_URL: http://user-service:8082
      APP_MOVIE_SERVICE_URL: http://movie-service:8083
      APP_REVIEW_SERVICE_URL: http://review-service:8084
      APP_FORUM_SERVICE_URL: http://forum-service:8085
    ports:
      - "8081:8081"
    depends_on:
      - movie-service
      - user-service
      - review-service
      - forum-service

  # -------------------------------------------------------------------------
  # ui-service  (port 8080)
  # -------------------------------------------------------------------------
  ui-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.ui-service
    container_name: ui-service
    environment:
      SERVER_PORT: 8080
      APP_API_SERVICE_URL: http://api-service:8081
      APP_MOVIE_SERVICE_URL: http://movie-service:8083
      APP_REVIEW_SERVICE_URL: http://review-service:8084
      APP_FORUM_SERVICE_URL: http://forum-service:8085
      APP_USER_SERVICE_URL: http://user-service:8082
      VAADIN_PRODUCTIONMODE: true
    ports:
      - "8080:8080"
    depends_on:
      - api-service
      - movie-service
      - user-service

volumes:
  postgres_data: